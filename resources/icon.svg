<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b9dff"/>
      <stop offset="0.55" stop-color="#2f6feb"/>
      <stop offset="1" stop-color="#1e46c2"/>
    </linearGradient>
    <radialGradient id="wp-sheen" cx="0.5" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="wp-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0a1c48" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#wp-bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#wp-sheen)"/>

  <!-- Waypoint mark: ring-headed pin (transparent center = the coordinate) -->
  <g transform="translate(44.8,45.6) scale(6.6)" filter="url(#wp-shadow)">
    <path fill="#ffffff" fill-rule="evenodd" d="
      M32 4 C20.95 4 12 12.95 12 24 c0 15 20 36 20 36 s20-21 20-36 C52 12.95 43.05 4 32 4 z
      M40.6 24 a8.6 8.6 0 1 0 -17.2 0 a8.6 8.6 0 1 0 17.2 0 z"/>
    <!-- crosshair reticle sitting on the open center -->
    <g fill="none" stroke="#ffffff" stroke-width="1.15" stroke-linecap="round">
      <path d="M32 16.9 V19.7"/>
      <path d="M32 28.3 V31.1"/>
      <path d="M24.9 24 H27.7"/>
      <path d="M36.3 24 H39.1"/>
    </g>
    <circle cx="32" cy="24" r="2.3" fill="#ffffff"/>
  </g>
</svg>
